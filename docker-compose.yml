services:
  # ─── Backend (Express + Prisma) ───────────────────────────
  backend:
    build:
      context: ./backend-clinicas
      dockerfile: Dockerfile
    container_name: clinicas-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Frontend (Vite + React → Nginx) ─────────────────────
  frontend:
    build:
      context: ./frontend-clinicas
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=
    container_name: clinicas-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
